<div class="header-content">
    <button class="menu-btn" (click)="onToggleSidebar()" title="Toggle sidebar">
    <span class="material-symbols-rounded">
      {{ collapsed ? 'menu' : 'menu_open' }}
    </span>
    </button>

    <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-name">Vivid</span>
    </div>

    <div class="spacer"></div>

    <div class="dept-picker" *ngIf="(departments$ | async) as depts">
        <ng-container *ngIf="depts.length > 1">
            <div class="select-wrapper">
                <span class="material-symbols-rounded select-icon">corporate_fare</span>
                <select #deptSel (change)="selectDepartment(deptSel.value || null)">
                    <option *ngIf="!(selectedDepartmentId$ | async)" value="" selected
                            disabled>{{ 'Select Department' }}
                    </option>
                    <option *ngFor="let d of depts" [value]="d.id"
                            [selected]="(selectedDepartmentId$ | async) === d.id">{{ d.name }}
                    </option>
                </select>
            </div>
        </ng-container>
    </div>

    <div class="env-picker" *ngIf="(environments$ | async) as envs">
        <ng-container *ngIf="envs.length === 0; else envSelect">
            <button class="add-env-btn" (click)="addEnvironment()">
                <span class="material-symbols-rounded">add</span>
                {{ 'Add Environment' }}
            </button>
        </ng-container>
        <ng-template #envSelect>
            <div class="select-wrapper">
                <span class="material-symbols-rounded select-icon">public</span>
                <select #sel (change)="selectEnvironmentById(sel.value || null)">
                    <option *ngIf="!(selectedEnvironment$ | async)" value="" selected
                            disabled>{{ 'Select Environment' }}
                    </option>
                    <option
                            *ngFor="let e of envs"
                            [value]="e.id"
                            [selected]="(selectedEnvironment$ | async)?.id === e.id">
                        {{ e.name }}
                    </option>
                </select>
            </div>
        </ng-template>
    </div>
</div>
