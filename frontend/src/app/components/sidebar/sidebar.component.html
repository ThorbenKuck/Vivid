<nav class="sidebar-nav">
  <div class="nav-links">
    <a routerLink="/features" routerLinkActive="active" class="nav-item">
      <span class="material-symbols-rounded">stars</span>
        @if (!collapsed) {
            <span class="label"> Features</span>
        }
    </a>
    <a *hasPermission="['environments', 'read']" routerLink="/environments" routerLinkActive="active" class="nav-item">
      <span class="material-symbols-rounded">public</span>
        @if(!collapsed) {
            <span class="label"> Environments</span>
        }
    </a>
    <a routerLink="/clients" routerLinkActive="active" class="nav-item">
      <span class="material-symbols-rounded">devices</span>
        @if(!collapsed) {
            <span class="label"> Clients</span>
        }
    </a>
    <a routerLink="/settings" routerLinkActive="active" class="nav-item">
      <span class="material-symbols-rounded">settings</span>
        @if(!collapsed) {
            <span class="label"> Settings</span>
        }
    </a>
  </div>

  <div class="sidebar-footer">
    <div class="theme-selector" *ngIf="!collapsed">
      <div class="select-wrapper">
        <span class="material-symbols-rounded select-icon">
          {{ current === 'dark' ? 'dark_mode' : 'light_mode' }}
        </span>
        <select [ngModel]="current" (ngModelChange)="setTheme($event)">
          <option *ngFor="let t of themes" [value]="t">{{ t }}</option>
        </select>
      </div>
    </div>
    
    <button class="icon-only-theme" *ngIf="collapsed" (click)="toggleTheme()" title="Change Theme">
      <span class="material-symbols-rounded">
        {{ current === 'dark' ? 'dark_mode' : 'light_mode' }}
      </span>
    </button>
  </div>
</nav>
