<div class="login-container">
    <div class="login-card">
        <div class="vivid-logo">Vivid</div>
        <div class="vivid-tagline">Feature Management for Modern Teams</div>

        <app-loading-indicator *ngIf="loading()"></app-loading-indicator>

        <div *ngIf="!loading() && !error()">
            <div *ngIf="issuer; else noProvider" class="auth-options">
                <button (click)="onLogin()">
                    <span class="icon">🔒</span>
                    Login with External Provider
                </button>
            </div>
            <ng-template #noProvider>
                <p class="warning">No external authentication provider is configured.</p>
            </ng-template>
        </div>

        <div *ngIf="error()" class="error-state">
            <p class="error-message">{{ error() }}</p>
            <button class="retry-button" (click)="loadConfig()">Retry</button>
        </div>
    </div>
</div>
