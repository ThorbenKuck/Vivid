<div class="page-header flex justify-between items-center gap-md">
  <h1 class="page-title text-lg">Environments</h1>
  <div class="search-bar">
    <app-form-input 
      icon="search" 
      [placeholder]="'common.search' "
      [(ngModel)]="q" 
      (keyup.enter)="search()">
    </app-form-input>
  </div>
</div>

<div class="environments-list-wrapper" *ngIf="result">
  <app-generic-table [items]="result.content">
    <ng-template #rowTemplate let-e>
      <div class="env-main flex items-center justify-between">
        <div class="env-info flex items-center gap-md">
          <span class="material-symbols-rounded" style="color: var(--accent-sky)">public</span>
          <div class="name-box">
            <span class="env-name text-sm">{{ e.name }}</span>
          </div>
        </div>
        
        <div class="env-actions flex items-center gap-sm">
          <button *hasPermission="['environments', 'write']" class="icon-btn-slim danger" (click)="$event.stopPropagation(); askDelete(e.id!)" [title]="'common.delete' ">
            <span class="material-symbols-rounded">delete</span>
          </button>
          <span class="material-symbols-rounded expand-icon text-muted" [style.transform]="e['__expanded'] ? 'rotate(180deg)' : 'none'">
            expand_more
          </span>
        </div>
      </div>
    </ng-template>

    <ng-template #expandTemplate let-e>
      <p class="env-description text-sm text-secondary">{{ e.description || ('common.no_description' ) }}</p>
    </ng-template>
  </app-generic-table>

  <app-pagination 
    [page]="page" 
    [totalPages]="totalPages" 
    [isLast]="isLast"
    (prev)="page = page - 1; search()" 
    (next)="page = page + 1; search()">
  </app-pagination>
</div>

<button *hasPermission="['environments', 'write']" class="fab shadow-slim" (click)="toggleAdd()" [title]="'common.add' ">
  <span class="material-symbols-rounded">add</span>
</button>

<!-- Modals -->
<div class="modal-overlay flex items-center justify-center" *ngIf="showAdd" (click)="toggleAdd()">
  <div class="modal-card card flex-col gap-md" (click)="$event.stopPropagation()">
    <h2 class="modal-title text-base">Add Environment</h2>
    <form [formGroup]="addForm" class="flex-col gap-md">
      <div class="form-group">
        <label class="text-xs text-muted">Name</label>
        <app-form-input formControlName="name" placeholder="Name"></app-form-input>
      </div>
      <div class="form-group">
        <label class="text-xs text-muted">{{ 'common.description' }}</label>
        <textarea formControlName="description" [placeholder]="'common.description' " rows="3"></textarea>
      </div>
    </form>
    <div class="modal-actions flex justify-end gap-sm">
      <button class="btn-slim" (click)="toggleAdd()">{{ 'common.cancel' }}</button>
      <button class="btn-slim primary" (click)="add()" [disabled]="addForm.invalid">{{ 'common.add' }}</button>
    </div>
  </div>
</div>

<div class="modal-overlay flex items-center justify-center" *ngIf="confirmDeleteId" (click)="cancelDelete()">
  <div class="modal-card card flex-col gap-md" (click)="$event.stopPropagation()">
    <h2 class="modal-title text-base">{{ 'common.confirm_action' }}</h2>
    <p class="text-sm text-secondary">{{ 'environments.confirmDelete' }}</p>
    <div class="modal-actions flex justify-end gap-sm">
      <button class="btn-slim" (click)="cancelDelete()">{{ 'common.cancel' }}</button>
      <button class="btn-slim danger" (click)="confirmDelete()">{{ 'common.delete' }}</button>
    </div>
  </div>
</div>
