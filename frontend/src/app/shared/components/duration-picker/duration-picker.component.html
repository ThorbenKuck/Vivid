<div class="duration-picker-container">
    <div class="duration-input-group">
        <input type="number"
               [(ngModel)]="minutes"
               (ngModelChange)="update()"
               min="0"
               class="duration-input"
               placeholder="0">
        <span class="duration-unit">m</span>
    </div>
    <div class="duration-input-group">
        <input type="number"
               [(ngModel)]="seconds"
               (ngModelChange)="update()"
               min="0"
               class="duration-input"
               placeholder="0">
        <span class="duration-unit">s</span>
    </div>
</div>
