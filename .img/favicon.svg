<svg width="400" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">

    <defs>
        <filter id="green-halo" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <filter id="red-halo" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <circle cx="50" cy="100" r="30" stroke="#D1C4E9" stroke-width="4" fill="none" />
    <circle cx="130" cy="100" r="30" stroke="#ff4d4d" fill="#ff4d4d" filter="url(#red-halo)" />
    <circle cx="210" cy="100" r="30" fill="#00ff88" filter="url(#green-halo)" />

</svg>
