<div class="page-header flex items-center gap-md">
  <button class="btn-icon" (click)="back()">
    <span class="material-symbols-rounded">arrow_back</span>
  </button>
  <h1 class="page-title text-lg" *ngIf="department">{{ department.name }}</h1>
</div>

<div class="tree-container card mt-lg" *ngIf="department">
  <div class="tree-root">
    <div class="tree-node department-node" [class.expanded]="department.expanded">
      <div class="node-content" (click)="department.expanded = !department.expanded">
        <span class="material-symbols-rounded expand-icon" [class.expanded]="department.expanded">chevron_right</span>
        <span class="material-symbols-rounded node-icon">corporate_fare</span>
        <span class="node-label">{{ department.name }}</span>
      </div>

      <div class="node-children" *ngIf="department.expanded">
        <div class="tree-node team-node" *ngFor="let team of department.teams" [class.expanded]="isTeamExpanded(team.id)">
          <div class="node-content" (click)="toggleTeam(team.id)">
            <span class="material-symbols-rounded expand-icon" [class.expanded]="isTeamExpanded(team.id)">chevron_right</span>
            <span class="material-symbols-rounded node-icon">group</span>
            <span class="node-label">{{ team.name }}</span>
            <span class="badge ml-sm">{{ team.memberCount }} members</span>
          </div>

          <div class="node-children" *ngIf="isTeamExpanded(team.id)">
            <div class="tree-node member-node" *ngFor="let member of team.members">
              <div class="node-content no-expand">
                <span class="material-symbols-rounded node-icon member-icon">person</span>
                <div class="member-info flex-col">
                  <span class="node-label text-sm">{{ member.username }}</span>
                  <span class="node-sublabel text-xs text-muted">{{ member.email }}</span>
                </div>
              </div>
            </div>
            <div class="tree-node empty-node" *ngIf="!team.members?.length">
              <div class="node-content no-expand text-muted text-xs italic">No members in this team</div>
            </div>
          </div>
        </div>
        <div class="tree-node empty-node" *ngIf="!department.teams?.length">
          <div class="node-content no-expand text-muted text-xs italic">No teams in this department</div>
        </div>
      </div>
    </div>
  </div>
</div>
