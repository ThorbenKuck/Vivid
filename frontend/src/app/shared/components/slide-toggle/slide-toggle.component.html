<label class="slide-toggle-container" [class.is-disabled]="disabled()" (click)="$event.preventDefault(); toggle()">
    <div class="switch" [class.is-checked]="checked()" [class.is-disabled]="disabled()">
        <div class="handle"></div>
    </div>
    @if (label()) {
        <span class="toggle-label">{{ label() }}</span>
    }
</label>
