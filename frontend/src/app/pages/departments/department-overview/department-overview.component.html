<div class="page-header flex justify-between items-center gap-md">
  <h1 class="page-title text-lg">{{ 'Departments' }}</h1>
</div>

<div class="departments-list-wrapper" *ngIf="departments$ | async as depts; else loading">
  <app-generic-table [items]="depts">
    <ng-template #rowTemplate let-d>
      <div class="dept-row-content flex items-center justify-between">
        <div class="col-name flex-1">
          <span class="dept-name text-sm font-medium">{{ d.name }}</span>
          <p class="dept-description text-xs text-muted">{{ d.description }}</p>
        </div>
        <div class="col-actions flex items-center justify-end" style="width: 120px;">
          <button class="btn-slim" (click)="openDetails(d)">
            <span>Open</span>
            <span class="material-symbols-rounded">open_in_new</span>
          </button>
        </div>
      </div>
    </ng-template>
  </app-generic-table>
</div>

<button class="fab" (click)="toggleAdd()" *hasPermission="['departments', 'write']" title="Create Department">
  <span class="material-symbols-rounded">add</span>
</button>

<div class="modal-overlay" *ngIf="showAdd" (click)="toggleAdd()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <h2 class="modal-title">Create Department</h2>
    <form [formGroup]="addForm" class="flex-col gap-md">
      <div class="form-group">
        <label class="text-xs text-muted">Name</label>
        <app-form-input formControlName="name" placeholder="Name"></app-form-input>
      </div>
      <div class="form-group">
        <label class="text-xs text-muted">Description</label>
        <textarea formControlName="description" placeholder="Description" rows="3"></textarea>
      </div>
    </form>
    <div class="modal-actions flex justify-end gap-sm">
      <button class="btn-slim" (click)="toggleAdd()">Cancel</button>
      <button class="btn-slim primary" (click)="add()" [disabled]="addForm.invalid || !addForm.value.name">
        Create
      </button>
    </div>
  </div>
</div>

<ng-template #loading>
  <div class="loading-state flex-col items-center justify-center card" style="min-height: 200px;">
    <span class="material-symbols-rounded rotate">sync</span>
    <p class="text-secondary">Loading...</p>
  </div>
</ng-template>
